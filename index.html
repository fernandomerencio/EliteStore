<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Top Acessórios</title>

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background-color: #121212;
      color: #f1f1f1;
    }

    header {
      background-color: #0d0d0d;
      color: white;
      text-align: center;
      padding: 25px;
      font-size: 34px;
      font-family: 'Poppins', sans-serif;
      letter-spacing: 3px;
      border-bottom: 1px solid #333;
      text-shadow: 0 0 10px rgba(231, 76, 60, 0.7); /* glow */
    }

    .mensagem {
      margin: 30px 40px;
      font-size: 20px;
      color: #bbbbbb;
      animation: fadeIn 1.5s ease-in;
    }

    .menu {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 20px;
      margin: 40px;
    }

    .menu a {
      width: 320px;
      background-color: #1f1f1f;
      color: white;
      text-decoration: none;
      padding: 18px;
      border-radius: 10px;
      font-size: 18px;
      border-left: 5px solid #e74c3c;
      transition: 0.3s;
    }

    .menu a:hover {
      background-color: #2c2c2c;
      transform: translateX(10px); /* efeito deslizar */
    }

    .contato {
      margin: 40px;
      padding: 20px;
      width: 320px;
      background-color: #0d0d0d;
      border-radius: 10px;
      border: 1px solid #333;
    }

    /* animação */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

  </style>
</head>

<body>

  <header>
     Elite Store
  </header>

  <p class="mensagem">
    O melhor e-commerce da atualidade
  </p>

  <div class="menu">
    <a href="bone.html">🧢 Bonés</a>
    <a href="joias.html">💎 Joias</a>
    <a href="acessorios.html">🕶️ Acessórios</a>
  </div>

  <div class="contato">
    <h2>📞 Contato</h2>
    <p>Email: fernandoismaille@gmail.com</p>
  </div>

</body>
</html>
