<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Joias - Elite Store</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background-color: #121212;
      color: #f1f1f1;
    }

    header {
      background-color: #0d0d0d;
      text-align: center;
      padding: 20px;
      font-size: 30px;
      font-family: 'Poppins', sans-serif;
      border-bottom: 1px solid #333;
    }

    .voltar {
      display: inline-block;
      margin: 20px 40px;
      color: #bbb;
      text-decoration: none;
    }

    .produtos {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 20px 40px;
    }

    .card {
      display: flex;
      align-items: center;
      background-color: #1f1f1f;
      padding: 10px;
      border-radius: 10px;
      width: 400px;
      border-left: 5px solid #e74c3c;
    }

    .card img {
      width: 120px;
      margin-right: 15px;
      border-radius: 10px;
    }

    .preco {
      color: #2ecc71;
      font-weight: bold;
    }
     .aviso {
  margin: 20px 40px;
  padding: 15px;
  background-color: #2c2c2c;
  border-left: 5px solid #e74c3c;
  color: #f1f1f1;
  font-weight: bold;
}
  </style>
</head>

<body>

  <header>💎 PULSEIRAS E CORRENTES</header>

 <p class="aviso">

</p>

  <div class="produtos">

    <div class="card">
      <img src="corrente4.webp">
      <div>
        <h3>Corrente dourada </h3>

      </div>
    </div>

    <div class="card">
      <img src="pulseira.webp">
      <div>

</body>
</html>
