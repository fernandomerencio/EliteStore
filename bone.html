<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Bonés -Elite Store</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background-color: #121212;
      color: #f1f1f1;
    }

    header {
      background-color: #0d0d0d;
      text-align: center;
      padding: 20px;
      font-size: 30px;
      font-family: 'Poppins', sans-serif;
      border-bottom: 1px solid #333;
      text-shadow: 0 0 8px rgba(231,76,60,0.7);
    }

    .voltar {
      display: inline-block;
      margin: 20px 40px;
      text-decoration: none;
      color: #bbb;
    }

    .voltar:hover {
      color: white;
    }

    .produtos {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 20px 40px;
    }

    .card {
      display: flex;
      align-items: center;
      background-color: #1f1f1f;
      border-radius: 10px;
      padding: 10px;
      width: 400px;
      border-left: 5px solid #e74c3c;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateX(10px);
    }

    .card img {
      width: 120px;
      border-radius: 10px;
      margin-right: 15px;
    }

    .card h3 {
      margin: 0;
    }

    .preco {
      color: #2ecc71;
      font-weight: bold;
    }
    .aviso {
  margin: 20px 40px;
  padding: 15px;
  background-color: #2c2c2c;
  border-left: 5px solid #e74c3c;
  color: #f1f1f1;
  font-weight: bold;
}
  </style>
</head>

<body>

  <header>🧢 BONÉS</header>
<p class="aviso">
  ⚠️ No momento estamos fora de estoque. Em breve novos produtos estarão disponíveis!
</p>
  
  <a href="index.html" class="voltar">⬅ Voltar</a>

  <div class="produtos">

    <div class="card">
      <img src="bone1.jpg.jpg">
      <div>
        <h3>Boné Preto</h3>
        <p class="preco">R$ 39,90</p>
      </div>
    </div>

    <div class="card">
      <img src="bone2.jpg">
      <div>
        <h3>Boné Branco</h3>
        <p class="preco">R$ 44,90</p>
      </div>
    </div>

  </div>

</body>
</html>
